name: Build and Release Packages

on:
  push:
    tags:
      - "v*" # Run when a tag is pushed that starts with 'v'
  workflow_dispatch: # Allow manual triggering

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo ./setup.sh

      - name: Build Debian package
        run: |
          # Build the package
          dpkg-buildpackage -us -uc -b

          # Move the .deb file to a known location
          mkdir -p artifacts
          mv ../momentum-mouse_*.deb artifacts/

      - name: Upload Debian package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: artifacts/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install basic tools
        run: dnf install -y git tar findutils
        
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: ./setup.sh

      - name: Prepare and Build RPM package
        run: |
          # Determine version
          VERSION=$(grep "Version:" momentum_mouse.spec | awk '{print $2}')
          
          # Setup rpmbuild tree
          rpmdev-setuptree
          
          # Create source tarball matching the spec file requirements
          mkdir -p ~/momentum_mouse-$VERSION
          cp -r . ~/momentum_mouse-$VERSION/
          tar -czvf ~/rpmbuild/SOURCES/momentum_mouse-$VERSION.tar.gz -C ~ momentum_mouse-$VERSION
          cp momentum_mouse.spec ~/rpmbuild/SPECS/
          
          # Build RPM
          rpmbuild -ba ~/rpmbuild/SPECS/momentum_mouse.spec
          
          # Move artifacts
          mkdir -p artifacts
          cp ~/rpmbuild/RPMS/x86_64/momentum_mouse-*.rpm artifacts/

      - name: Upload RPM package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: artifacts/*.rpm

  release:
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/debian-package/*.deb
            artifacts/rpm-package/*.rpm
          draft: false
          prerelease: false
          generate_release_notes: true
